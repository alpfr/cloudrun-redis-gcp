apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: default
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: gcr.io/alpfr-splunk-integration/flask-redis-app:latest # Will be replaced by deployment script
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis" # DNS name of the Redis ClusterIP service
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Notice: runAsNonRoot is NOT used here to satisfy constraints.
          # securityContext:
          #   runAsUser: 0
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: default
  labels:
    app: flask-app
spec:
  ports:
    - name: http
      port: 80
      targetPort: 5000
  type: ClusterIP
  selector:
    app: flask-app
