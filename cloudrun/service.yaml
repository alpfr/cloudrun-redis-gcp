apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: flask-redis-app
  labels:
    app: flask-redis-app
spec:
  template:
    metadata:
      annotations:
        # Direct VPC Egress (Recommended: faster, cheaper, and easier to manage)
        run.googleapis.com/network-interfaces: '[{"network":"YOUR_NETWORK","subnetwork":"YOUR_SUBNET"}]'
        run.googleapis.com/vpc-access-egress: "private-ranges-only"
    spec:
      containers:
        - image: gcr.io/alpfr-splunk-integration/flask-redis-app:latest # Will be replaced by Cloud Build image tag
          ports:
            - name: http1
              containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "YOUR_REDIS_IP" # Replace with Memorystore Redis instance private IP
            - name: REDIS_PORT
              value: "6379"
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
