apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: default
  labels:
    app: redis
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    tcp-keepalive 300
    dbfilename dump.rdb
    dir /data
    
    # Persistence Settings
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    
    # Memory Management
    maxmemory 512mb
    maxmemory-policy allkeys-lru
