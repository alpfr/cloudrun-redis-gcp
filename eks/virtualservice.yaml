apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: redis-virtualservice
  namespace: default
spec:
  hosts:
    - "*"
  gateways:
    - redis-gateway
  tcp:
    - match:
        - port: 443
      route:
        - destination:
            host: redis
            port:
              number: 6379
